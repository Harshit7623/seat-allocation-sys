<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Exam Invigilation Reporting System">
    <title>Exam Invigilation Report</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="loginSection" class="login-container">
            <header>
                <h1>Exam Invigilation Report</h1>
                <p class="subtitle">Sign in with your Google Account</p>
            </header>
            <div class="login-box">
                <div id="g_id_onload"
                     data-client_id="647849200108-2t4bc5a9q85ppoqhmh8t6rftk923ql9s.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="standard"></div>
            </div>
        </div>

        <!-- Main App Section (Hidden until logged in) -->
        <div id="appSection" class="hidden">
            <header>
                <h1>Exam Invigilation Report</h1>
                <div class="user-info">
                    <img id="userPhoto" src="" alt="User Photo" class="user-photo">
                    <span id="userName"></span>
                    <button id="themeToggleBtn" class="btn-tertiary theme-toggle-btn">🌙 Dark</button>
                    <button id="signOutBtn" class="btn-tertiary">Sign Out</button>
                </div>
            </header>

            <main>
                <!-- Alert/Message Box -->
                <div id="alertBox" class="alert hidden">
                    <span id="alertMessage"></span>
                    <button class="close-btn" onclick="closeAlert()">&times;</button>
                </div>

                <!-- Loading Spinner -->
                <div id="loadingSpinner" class="spinner hidden">
                    <div class="spinner-circle"></div>
                    <p id="loadingMessage">Processing...</p>
                </div>

                <!-- Success Message with Post-Submit Actions -->
                <div id="successBox" class="success-box hidden">
                    <p id="successMessage">✓ Report submitted successfully!</p>
                    <div class="success-actions">
                        <button id="editResponseBtn" class="btn-primary">Edit Response</button>
                        <button id="submitNewResponseBtn" class="btn-tertiary">Submit New Response</button>
                    </div>
                </div>

                <!-- Invigilation Form -->
                <form id="invigilationForm" class="report-form">
                    <h2 id="formTitle">Submit Exam Report</h2>

                    <div class="form-group">
                        <label for="examDate">Date <span class="required">*</span></label>
                        <input type="date" id="examDate" name="examDate" required>
                        <span class="error-message" id="examDateError"></span>
                    </div>

                    <div class="form-group">
                        <label for="examTime">Exam Time <span class="required">*</span></label>
                        <div class="exam-time-row">
                            <input type="time" id="examTime" name="examTime" required>
                            <select id="examMeridiem" name="examMeridiem" required>
                                <option value="AM">AM</option>
                                <option value="PM">PM</option>
                            </select>
                        </div>
                        <small id="examTimeSlotHint" class="field-hint">Auto slot: —</small>
                        <span class="error-message" id="examTimeError"></span>
                    </div>

                    <div class="form-group">
                        <label for="facultyInvigilator1">Faculty Invigilator 1 <span class="required">*</span></label>
                        <input type="text" id="facultyInvigilator1" name="facultyInvigilator1" required placeholder="Enter faculty name">
                        <span class="error-message" id="facultyInvigilator1Error"></span>
                    </div>

                    <div class="form-group">
                        <label for="facultyInvigilator2">Faculty Invigilator 2 <span class="required">*</span></label>
                        <input type="text" id="facultyInvigilator2" name="facultyInvigilator2" required placeholder="Enter faculty name">
                        <span class="error-message" id="facultyInvigilator2Error"></span>
                    </div>

                    <div class="form-group">
                        <label for="facultyInvigilator3">Faculty Invigilator 3 (Optional)</label>
                        <input type="text" id="facultyInvigilator3" name="facultyInvigilator3" placeholder="Enter faculty name">
                        <span class="error-message" id="facultyInvigilator3Error"></span>
                    </div>

                    <div class="form-group">
                        <label for="blankCopiesReceived">Total Blank Answer Copies Received (DU) <span class="required">*</span></label>
                        <input type="number" id="blankCopiesReceived" name="blankCopiesReceived" required min="0" placeholder="e.g., 100">
                        <span class="error-message" id="blankCopiesReceivedError"></span>
                    </div>

                    <div class="form-group">
                        <label for="copiesUsed">Total Answer Copies Used (DU) <span class="required">*</span></label>
                        <input type="number" id="copiesUsed" name="copiesUsed" required min="0" placeholder="e.g., 85">
                        <span class="error-message" id="copiesUsedError"></span>
                    </div>

                    <div class="form-group">
                        <label for="cancelledCopies">Total Cancelled Copies <span class="required">*</span></label>
                        <input type="number" id="cancelledCopies" name="cancelledCopies" value="0" min="0" placeholder="0">
                        <span class="error-message" id="cancelledCopiesError"></span>
                    </div>

                    <div class="form-group">
                        <label for="copiesReturned">Total Copies Returned <span class="required">*</span></label>
                        <input type="number" id="copiesReturned" name="copiesReturned" required min="0" placeholder="e.g., 15">
                        <span class="error-message" id="copiesReturnedError"></span>
                    </div>

                    <div class="form-group">
                        <label for="roomNumber">Room Number <span class="required">*</span></label>
                        <select id="roomNumber" name="roomNumber" required>
                            <option value="">Select Room</option>
                            <option value="113A">113A</option>
                            <option value="113B">113B</option>
                            <option value="103A">103A</option>
                            <option value="105">105</option>
                            <option value="SH7">SH7</option>
                            <option value="SH8">SH8</option>
                            <option value="LT-1">LT-1</option>
                            <option value="LT-2">LT-2</option>
                            <option value="M004">M004</option>
                            <option value="Other">Other</option>
                        </select>
                        <span class="error-message" id="roomNumberError"></span>
                    </div>

                    <!-- Class 1 (Required) -->
                    <div class="class-section">
                        <h3>Class 1 <span class="required">*</span></h3>
                        
                        <div class="form-group">
                            <label for="class1">Class Name <span class="required">*</span></label>
                            <input type="text" id="class1" name="class1" required placeholder="e.g., B.Sc. (H) Computer Science - Sem 3">
                            <span class="error-message" id="class1Error"></span>
                        </div>

                        <div class="form-group">
                            <label for="subjectClass1">Subject Code and Name <span class="required">*</span></label>
                            <input type="text" id="subjectClass1" name="subjectClass1" required placeholder="e.g., CS301 - Data Structures">
                            <span class="error-message" id="subjectClass1Error"></span>
                        </div>

                        <div class="form-group">
                            <label for="studentsClass1">No. of Students Present <span class="required">*</span></label>
                            <input type="number" id="studentsClass1" name="studentsClass1" required min="0" placeholder="e.g., 30">
                            <span class="error-message" id="studentsClass1Error"></span>
                        </div>
                    </div>

                    <!-- Class 2 (Optional) -->
                    <div class="class-section optional-section">
                        <h3>Class 2 (Optional)</h3>
                        
                        <div class="form-group">
                            <label for="class2">Class Name</label>
                            <input type="text" id="class2" name="class2" placeholder="e.g., B.Sc. (H) Mathematics - Sem 3">
                            <span class="error-message" id="class2Error"></span>
                        </div>

                        <div class="form-group">
                            <label for="subjectClass2">Subject Code and Name</label>
                            <input type="text" id="subjectClass2" name="subjectClass2" placeholder="e.g., MATH301 - Linear Algebra">
                            <span class="error-message" id="subjectClass2Error"></span>
                        </div>

                        <div class="form-group">
                            <label for="studentsClass2">No. of Students Present</label>
                            <input type="number" id="studentsClass2" name="studentsClass2" min="0" placeholder="e.g., 25">
                            <span class="error-message" id="studentsClass2Error"></span>
                        </div>
                    </div>

                    <!-- Class 3 (Optional) -->
                    <div class="class-section optional-section">
                        <h3>Class 3 (Optional)</h3>
                        
                        <div class="form-group">
                            <label for="class3">Class Name</label>
                            <input type="text" id="class3" name="class3" placeholder="e.g., B.A. (H) English - Sem 3">
                            <span class="error-message" id="class3Error"></span>
                        </div>

                        <div class="form-group">
                            <label for="subjectClass3">Subject Code and Name</label>
                            <input type="text" id="subjectClass3" name="subjectClass3" placeholder="e.g., ENG301 - British Literature">
                            <span class="error-message" id="subjectClass3Error"></span>
                        </div>

                        <div class="form-group">
                            <label for="studentsClass3">No. of Students Present</label>
                            <input type="number" id="studentsClass3" name="studentsClass3" min="0" placeholder="e.g., 20">
                            <span class="error-message" id="studentsClass3Error"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="attendanceImage">Attendance Sheet Image(s) <span class="required">*</span></label>
                        <div class="file-upload-wrapper">
                            <input type="file" id="attendanceImage" name="attendanceImage" accept="image/*" multiple required>
                            <div class="file-upload-display">
                                <span id="fileNameDisplay">No file chosen</span>
                                <button type="button" class="btn-secondary" onclick="document.getElementById('attendanceImage').click()">
                                    Choose File
                                </button>
                            </div>
                        </div>
                        <span class="error-message" id="attendanceImageError"></span>
                        <div id="imagePreview" class="image-preview hidden"></div>
                        <div id="existingImagePreview" class="image-preview hidden"></div>
                    </div>

                    <div class="form-group">
                        <label for="remarks">Remarks</label>
                        <textarea id="remarks" name="remarks" rows="4" placeholder="Any additional notes or comments"></textarea>
                        <span class="error-message" id="remarksError"></span>
                    </div>

                    <input type="hidden" id="userEmail" name="userEmail">
                    <input type="hidden" id="recordId" name="recordId">

                    <div class="form-actions">
                        <button type="submit" id="submitBtn" class="btn-primary">
                            Submit Report
                        </button>
                        <button type="button" id="resetBtn" class="btn-tertiary" onclick="resetForm()">
                            Reset Form
                        </button>
                    </div>
                </form>
            </main>

            <footer>
                <p>&copy; 2026 Exam Invigilation System. All rights reserved.</p>
            </footer>
        </div>
    </div>

    <script src="app.js?v=20260303-1"></script>
</body>
</html>
